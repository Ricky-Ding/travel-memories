<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Travel Memories </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://unpkg.com/globe.gl"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-heart"></i>
            <span>我们的旅行记忆</span>
        </div>
        <div class="nav-actions">
            <button id="add-memory-btn" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加记忆
            </button>
            <button id="sync-data-btn" class="btn btn-secondary" title="同步数据">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧地图 -->
        <div id="map"></div>
        
        <!-- 右侧面板 -->
        <div id="side-panel" class="side-panel">
            <!-- 面板头部 -->
            <div class="panel-header">
                <h2><i class="fas fa-map-marked-alt"></i> 旅行足迹</h2>
                <div class="stats">
                    <span id="city-count">0</span> 个城市
                </div>
            </div>
            
            <!-- 搜索框 -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="搜索城市...">
            </div>
            
            <!-- 城市列表 -->
            <div id="city-list" class="city-list"></div>
            
            <!-- 城市详情 -->
            <div id="city-detail" class="city-detail" style="display: none;">
                <button id="back-btn" class="btn-back">
                    <i class="fas fa-arrow-left"></i> 返回
                </button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑记忆的模态框 -->
    <div id="memory-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">添加旅行记忆</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="memory-form">
                <input type="hidden" id="memory-id">
                
                <div class="form-group">
                    <label for="city-name">
                        <i class="fas fa-city"></i> 城市名称 *
                    </label>
                    <input type="text" id="city-name" required 
                           placeholder="例如：北京">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="latitude">
                            <i class="fas fa-map-pin"></i> 纬度 *
                        </label>
                        <input type="number" id="latitude" required 
                               step="any" placeholder="39.9042">
                    </div>
                    <div class="form-group">
                        <label for="longitude">
                            <i class="fas fa-map-pin"></i> 经度 *
                        </label>
                        <input type="number" id="longitude" required 
                               step="any" placeholder="116.4074">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="travel-date">
                        <i class="fas fa-calendar"></i> 旅行日期 *
                    </label>
                    <input type="text" id="travel-date" required 
                           placeholder="例如：2024年3月">
                </div>
                
                <div class="form-group">
                    <label for="description">
                        <i class="fas fa-pen"></i> 旅行故事
                    </label>
                    <textarea id="description" rows="4" 
                              placeholder="记录下你们的美好回忆..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="photos-upload">
                        <i class="fas fa-images"></i> 照片
                    </label>
                    <div class="photo-upload-area" id="photo-upload-area">
                        <input type="file" id="photos-upload" 
                               accept="image/*" multiple hidden>
                        <div class="upload-placeholder" id="upload-placeholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>点击上传照片</p>
                            <span>支持 JPG、PNG 格式</span>
                        </div>
                        <div class="photo-previews" id="photo-previews"></div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal-btn">
                        取消
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存记忆
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 照片查看器 -->
    <div id="photo-viewer" class="photo-viewer">
        <button class="close-viewer">&times;</button>
        <img id="viewer-image" src="" alt="">
        <p id="viewer-caption"></p>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
