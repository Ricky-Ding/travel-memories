<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💑 我们的旅行记忆</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录验证层 -->
    <div id="login-overlay" style="
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
    ">
        <div style="
            background: white; border-radius: 20px; padding: 40px 30px;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 350px; width: 90%;
        ">
            <div style="font-size: 50px; margin-bottom: 15px;">💑</div>
            <h2 style="margin-bottom: 10px; color: #333;">我们的旅行记忆</h2>
            <p style="color: #999; margin-bottom: 25px; font-size: 14px;">请输入密码查看</p>
            <input type="password" id="login-password" placeholder="输入密码"
                style="width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; 
                       border-radius: 10px; font-size: 16px; text-align: center;
                       outline: none; margin-bottom: 15px;">
            <button id="login-btn" style="
                width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white; border: none; border-radius: 10px; font-size: 16px;
                cursor: pointer; font-weight: 600;
            ">进入</button>
            <p id="login-error" style="color: #ff4757; margin-top: 10px; font-size: 13px; display: none;">
                密码错误，请重试
            </p>
        </div>
    </div>

    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-heart"></i>
            <span>我们的旅行记忆</span>
        </div>
        <div class="nav-actions">
            <button id="add-memory-btn" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加记忆
            </button>
            <button id="export-data-btn" class="btn btn-secondary" title="导出数据">
                <i class="fas fa-download"></i>
            </button>
            <label class="btn btn-secondary" title="导入数据">
                <i class="fas fa-upload"></i>
                <input type="file" id="import-data-input" accept=".json" hidden>
            </label>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧地图 -->
        <div id="map"></div>
        
        <!-- 右侧面板 -->
        <div id="side-panel" class="side-panel">
            <div class="panel-header">
                <h2><i class="fas fa-map-marked-alt"></i> 旅行足迹</h2>
                <div class="stats">
                    <span id="city-count">0</span> 个城市
                </div>
            </div>
            
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="搜索城市...">
            </div>
            
            <div id="city-list" class="city-list"></div>
            
            <div id="city-detail" class="city-detail" style="display: none;">
                <button id="back-btn" class="btn-back">
                    <i class="fas fa-arrow-left"></i> 返回列表
                </button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑记忆的模态框 -->
    <div id="memory-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">✨ 添加旅行记忆</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="memory-form">
                <input type="hidden" id="memory-id">
                
                <div class="form-group">
                    <label><i class="fas fa-city"></i> 城市名称 *</label>
                    <input type="text" id="city-name" required placeholder="例如：北京、成都、大理...">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> 在地图上点击选择位置 *</label>
                    <div id="map-picker" style="height: 220px; border-radius: 10px; border: 2px solid #e0e0e0;"></div>
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">
                        💡 点击地图选择城市位置，或拖拽标记微调
                    </p>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-map-pin"></i> 纬度</label>
                        <input type="number" id="latitude" required step="any" placeholder="自动填入" readonly style="background: #f9f9f9;">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-map-pin"></i> 经度</label>
                        <input type="number" id="longitude" required step="any" placeholder="自动填入" readonly style="background: #f9f9f9;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-calendar"></i> 旅行日期 *</label>
                    <input type="text" id="travel-date" required placeholder="例如：2024年3月">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-pen"></i> 旅行故事</label>
                    <textarea id="description" rows="4" placeholder="记录下你们的美好回忆..."></textarea>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-images"></i> 照片</label>
                    <div class="photo-upload-area" id="photo-upload-area">
                        <input type="file" id="photos-upload" accept="image/*" multiple hidden>
                        <div class="upload-placeholder" id="upload-placeholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>点击上传照片或拖拽到此处</p>
                            <span>支持 JPG、PNG，自动上传云端</span>
                        </div>
                        <div class="photo-previews" id="photo-previews"></div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal-btn">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存记忆
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 照片查看器 -->
    <div id="photo-viewer" class="photo-viewer">
        <button class="close-viewer">&times;</button>
        <img id="viewer-image" src="" alt="">
        <p id="viewer-caption"></p>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/memory-manager.js"></script>
    <script src="js/photo-manager.js"></script>
    <script src="js/imgbb-uploader.js"></script>
    <script src="js/map-manager.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
